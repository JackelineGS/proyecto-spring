spring.application.name=proyecto-spring
spring.thymeleaf.cache=false

# ---- H2 + Hibernate ddl-auto ----
# Dejamos que Hibernate cree/actualice el esquema en base al modelado @Entity.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=create

spring.datasource.url=jdbc:h2:file:./datos_db/proyecto-spring;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar la consola web de H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
