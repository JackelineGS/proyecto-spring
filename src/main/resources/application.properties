spring.application.name=proyecto-spring
spring.thymeleaf.cache=false

# ---- Hibernate/JPA startup workaround (H2) ----
# Prevent Hibernate from running DDL at startup (avoids H2 unsupported connection feature errors)
spring.jpa.hibernate.ddl-auto=none

# Explicit datasource override for H2 (no AUTO_SERVER / DB_CLOSE_ON_EXIT)
spring.datasource.url=jdbc:h2:mem:proyecto-spring;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

