<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Iniciar Sesión - Digital Health')}"></head>
<body class="bg-background text-foreground min-h-screen flex flex-col">

    <div class="min-h-[calc(100vh-12rem)] flex items-center justify-center px-6 py-12 flex-1">
        <div class="w-full max-w-md rounded-3xl border border-border bg-card p-10 shadow-sm">
            <div class="flex flex-col items-center text-center gap-3 mb-8">
                <div class="w-12 h-12 rounded-full bg-primary/10 text-primary flex items-center justify-center">
                    <i data-lucide="heart" class="w-6 h-6"></i>
                </div>
                <h1 class="tracking-tight text-2xl font-medium">Iniciar sesión</h1>
                <p class="text-muted-foreground">Acceso para especialistas y administradores</p>
            </div>

            <div th:if="${error}" class="mb-5 rounded-md border border-red-500/50 bg-red-500/10 p-3 text-sm text-red-500 text-center">
                <span th:text="${error}">Error</span>
            </div>

            <form th:action="@{/login}" method="post" class="space-y-5">
                <div class="space-y-2">
                    <label for="correo" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
                        Ingrese su correo electrónico
                    </label>
                    <input id="correo" name="correo" type="email" required
                           class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
                           placeholder="nombre@digitalhealth.pe">
                </div>
                <div class="space-y-2">
                    <label for="password" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
                        Ingrese su contraseña
                    </label>
                    <input id="password" name="password" type="password" required
                           class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
                </div>
                <button type="submit" 
                        class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-11 px-8 w-full">
                    Ingresar
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
