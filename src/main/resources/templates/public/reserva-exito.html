<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Reserva confirmada')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav('servicios')}"></div>

<main class="exito" th:if="${confirmacion}">
    <div class="exito-icon" aria-hidden="true">✓</div>
    <h1>¡Reserva confirmada!</h1>
    <p class="text-muted">
        Hola <strong th:text="${confirmacion.paciente}">Paciente</strong>,
        te enviamos los detalles de tu cita a
        <strong th:text="${confirmacion.correo}">correo</strong>.
        Tu paquete <strong th:text="${confirmacion.paquete}">paquete</strong>
        con <strong th:text="${confirmacion.empleado}">especialista</strong>
        está agendada para el
        <strong th:text="${confirmacion.fecha}">fecha</strong>
        a las <strong th:text="${confirmacion.hora}">hora</strong>.
    </p>
    <p class="text-muted">
        Comprobante: <span th:text="${confirmacion.tipoComprobante}">—</span>
        (<span th:text="${confirmacion.documento}">—</span>)
        · Método de pago: <span th:text="${confirmacion.metodoPago}">—</span>
    </p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;">
        <a th:href="@{/comprobante/{id}(id=${confirmacion.pagoId})}" class="btn btn-primary">Ver comprobante</a>
        <a th:href="@{/}" class="btn btn-outline">Volver al inicio</a>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
