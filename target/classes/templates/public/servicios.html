<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Servicios')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav('servicios')}"></div>

<main>
    <section class="page-header">
        <div class="container">
            <h1>Consultorio de Salud Mental</h1>
            <p>Consultas Online y Presencial</p>
            <a href="https://wa.me/51923826177" class="btn btn-outline" target="_blank" rel="noopener">Solicitar información</a>
        </div>
    </section>

    <section class="section section-muted">
        <div class="container">
            <h2 class="section-center" style="margin-bottom: 2.5rem;">Nuestro Catálogo de Paquetes</h2>
            <div class="tabs">
                <!-- Genera las pestañas dinámicamente -->
                <button type="button" class="tab-btn" th:each="tipo, stat : ${tiposPaquete}" 
                        th:classappend="${stat.first} ? 'active' : ''" 
                        th:attr="data-tab=${tipo.id}" 
                        th:text="${tipo.nombre}">Categoría</button>
            </div>

            <!-- Paneles dinámicos por cada tipo de paquete -->
            <div class="tab-panel" th:each="tipo, stat : ${tiposPaquete}" 
                 th:classappend="${stat.first} ? 'active' : ''" 
                 th:attr="data-panel=${tipo.id}">
                <div class="grid-4">
                    <!-- Iterar sobre los paquetes que pertenecen a este tipo -->
                    <article class="card" th:each="p : ${tipo.paquetes}">
                        <div class="card-media card-media--wide">
                            <img src="https://images.unsplash.com/photo-1573497019418-b400bb3ab074?w=800&q=80" alt="Terapia">
                        </div>
                        <div class="card-body" style="display:flex;flex-direction:column;gap:0.75rem;flex:1;">
                            <h3 th:text="${p.nombre}">Paquete</h3>
                            <p class="price" th:text="'S/. ' + ${#numbers.formatDecimal(p.precio, 1, 2)}">S/. 0</p>
                            <p class="text-muted" th:text="'Visitas incluidas: ' + ${p.cantidadVisitas}">Visitas</p>
                            <p class="text-muted" th:text="'Duración: ' + ${p.duracionPorVisita}">Duración</p>
                            <a th:href="@{/reservar/{id}(id=${p.id})}" class="btn btn-primary btn-block" style="margin-top:auto;">Reservar Hoy</a>
                        </div>
                    </article>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
