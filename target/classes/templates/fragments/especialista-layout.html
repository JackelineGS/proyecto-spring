<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- HEADER FRAGMENT -->
<div th:fragment="header">
    <header class="border-b border-border bg-background/80 backdrop-blur-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a th:href="@{/}" class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-full bg-primary/10 text-primary flex items-center justify-center">
                    <i data-lucide="heart" class="w-5 h-5"></i>
                </div>
                <span class="tracking-tight">Digital Health &middot; Especialistas</span>
            </a>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium" th:if="${session.usuario != null}" th:text="'Hola, ' + ${session.usuario.nombreCompleto}">Hola, Especialista</span>
                <button type="button" onclick="document.getElementById('modal-perfil').classList.remove('hidden')" class="flex items-center gap-2 text-muted-foreground hover:text-foreground transition text-sm">
                    <i data-lucide="user" class="w-4 h-4"></i>
                    Editar perfil
                </button>
                <a th:href="@{/login}" class="flex items-center gap-2 text-muted-foreground hover:text-foreground transition text-sm">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    Cerrar sesión
                </a>
            </div>
        </div>
    </header>
    
    <!-- Modal Edit Profile -->
    <div id="modal-perfil" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 backdrop-blur-sm">
        <div class="bg-white border border-border rounded-2xl shadow-xl w-full max-w-md mx-4 p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-medium tracking-tight">Editar Perfil</h2>
                <button onclick="document.getElementById('modal-perfil').classList.add('hidden')" class="text-muted-foreground hover:text-foreground transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form th:action="@{/especialista/perfil/actualizar}" method="post" class="space-y-4">
                <div class="form-group">
                    <label class="text-sm font-medium">Celular</label>
                    <input type="text" name="celular" class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2" required>
                </div>
                <div class="form-group">
                    <label class="text-sm font-medium">Nueva Contraseña (dejar en blanco para no cambiar)</label>
                    <input type="password" name="contrasenia" class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
                </div>
                <button type="submit" class="w-full flex items-center justify-center bg-primary text-primary-foreground hover:bg-primary/90 rounded-md h-10 px-4 text-sm font-medium transition-colors">
                    Guardar Cambios
                </button>
            </form>
        </div>
    </div>
</div>

<!-- SIDEBAR FRAGMENT -->
<aside th:fragment="sidebar(activeMenu)" class="space-y-1">
    <a th:href="@{/especialista/citas}"
       th:classappend="${activeMenu == 'citas' ? 'bg-primary/10 text-primary' : 'text-muted-foreground hover:bg-muted hover:text-foreground'}"
       class="flex items-center gap-3 rounded-xl px-4 py-3 transition">
        <i data-lucide="calendar-days" class="w-4 h-4"></i>
        Citas
    </a>
    <a th:href="@{/especialista/historias}"
       th:classappend="${activeMenu == 'historias' ? 'bg-primary/10 text-primary' : 'text-muted-foreground hover:bg-muted hover:text-foreground'}"
       class="flex items-center gap-3 rounded-xl px-4 py-3 transition">
        <i data-lucide="folder-heart" class="w-4 h-4"></i>
        Historias clínicas
    </a>
    <a th:href="@{/especialista/horarios}"
       th:classappend="${activeMenu == 'horarios' ? 'bg-primary/10 text-primary' : 'text-muted-foreground hover:bg-muted hover:text-foreground'}"
       class="flex items-center gap-3 rounded-xl px-4 py-3 transition">
        <i data-lucide="clock" class="w-4 h-4"></i>
        Horarios
    </a>
</aside>

</body>
</html>
